# Backend only (frontend deployed to Vercel). Push to GitHub → both auto-deploy.
services:
  - type: web
    name: mana-mingle
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false
